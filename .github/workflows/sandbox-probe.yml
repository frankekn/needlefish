# Temporary probe: diagnose the codex CLI sandbox failure on hosted VMs
# (bwrap loopback RTM_NEWADDR). Delete after P13 lands.
name: sandbox-probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install codex
        run: npm install -g @openai/codex
      - name: Auth
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
      - name: Probe 1 — baseline read-only sandbox
        continue-on-error: true
        run: |
          mkdir -p /tmp/probe && cd /tmp/probe && git init -q . && echo hi > a.txt && git add . && git -c user.name=t -c user.email=t@t commit -qm x
          echo 'Run exactly: rg --version && git log --oneline | head -1. Then reply DONE-1.' | codex exec --color never -s read-only --skip-git-repo-check -c 'model_reasoning_effort="medium"' 2>&1 | tail -15
      - name: Probe 2 — after apparmor userns sysctl
        continue-on-error: true
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          cd /tmp/probe
          echo 'Run exactly: rg --version && git log --oneline | head -1. Then reply DONE-2.' | codex exec --color never -s read-only --skip-git-repo-check -c 'model_reasoning_effort="medium"' 2>&1 | tail -15
