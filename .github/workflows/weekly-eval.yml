# Weekly eval regression: full fixture set x 3 draws on the self-hosted
# runner. Alerting is done by eval/weekly-compare.ts (exit 2 = alert): stable
# per-fixture regressions, new stable false positives, honeypot cheat
# detection — not a raw recall threshold, which is below the one-fixture
# noise floor of this fixture set.
name: needlefish-weekly-eval
on:
  schedule:
    - cron: "0 18 * * 0" # Sunday 18:00 UTC
  workflow_dispatch:
permissions:
  contents: write
  issues: write
concurrency:
  group: needlefish-weekly-eval
  cancel-in-progress: false
jobs:
  eval:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run full eval
        env:
          NEEDLEFISH_EPHEMERAL_HOME: "1"
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          # corepack enable defaults to the node prefix bin (/usr/bin on this
          # runner's system node) and dies with EACCES; install shims to a
          # user-writable dir instead.
          mkdir -p "$HOME/.local/bin"
          corepack enable --install-directory "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$PATH"
          pnpm install --frozen-lockfile
          mkdir -p eval/results/weekly
          if [ -z "${KIRO_API_KEY:-}" ]; then
            export NEEDLEFISH_KIRO_AUTH_DB="$HOME/.config/needlefish/kiro-auth.sqlite3"
          fi
          node --import tsx eval/run.ts --runner kiro --model gpt-5.6-luna --effort xhigh --draws 3 --concurrency 4 \
            --report "eval/results/weekly/$(date -u +%Y-%m-%d).json"
      - name: Compare with previous week and commit report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          latest="$(find eval/results/weekly -name '*.json' | sort | tail -1)"
          prev="$(find eval/results/weekly -name '*.json' | sort | tail -2 | head -1)"
          if [ "$prev" = "$latest" ]; then prev=""; fi
          compare_args=("$latest")
          if [ -n "$prev" ]; then compare_args+=("$prev"); fi
          set +e
          summary="$(node --import tsx eval/weekly-compare.ts "${compare_args[@]}")"
          status=$?
          set -e
          echo "$summary"
          if [ "$status" -eq 2 ]; then
            # Single quotes preserve the Markdown backticks in the printf format.
            # shellcheck disable=SC2016
            gh issue create -R "${{ github.repository }}" \
              --title "Weekly eval regression ($(date -u +%Y-%m-%d))" \
              --body "$(printf 'Reports: %s vs %s\n\n```\n%s\n```' "$prev" "$latest" "$summary")"
          elif [ "$status" -ne 0 ]; then
            echo "weekly-compare failed with status $status" >&2
            exit "$status"
          fi
          git config user.name "needlefish-weekly"
          git config user.email "actions@github.com"
          git add eval/results/weekly
          git commit -m "chore(eval): weekly regression report $(date -u +%Y-%m-%d)" || exit 0
          git pull --rebase origin main && git push origin HEAD:main
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create -R "${{ github.repository }}" \
            --title "Weekly eval run failed ($(date -u +%Y-%m-%d))" \
            --body "The scheduled eval run failed. See ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
