name: needlefish-review

# Trusted-tool pattern: the reviewer (needlefish) is checked out from `main`
# (trusted); only the PR head under review is untrusted. This prevents a PR from
# controlling its own review by modifying the tool. For OTHER repos, copy this
# workflow and point the tool checkout at frankekn/needlefish@main.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review (manual trigger; bypasses pull_request webhook)
        required: true
      runner:
        description: "Model runner: codex, claude, or opencode"
        required: false
      model:
        description: Optional model id for the selected runner
        required: false
      timeout_ms:
        description: Optional per-call timeout in milliseconds
        required: false
  workflow_call:
    inputs:
      pr_number:
        description: PR number (optional; defaults to the event PR)
        type: string
        required: false
      runner:
        description: "Model runner: codex, claude, or opencode"
        type: string
        required: false
      model:
        description: Optional model id for the selected runner
        type: string
        required: false
      timeout_ms:
        description: Optional per-call timeout in milliseconds
        type: string
        required: false

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Resolve PR refs
        id: refs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ inputs.pr_number || github.event.inputs.pr_number || github.event.pull_request.number }}
          EVENT_HEAD: ${{ github.event.pull_request.head.sha }}
          EVENT_BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$EVENT_HEAD" ]; then
            echo "head=$EVENT_HEAD" >> "$GITHUB_OUTPUT"
            echo "base=$EVENT_BASE" >> "$GITHUB_OUTPUT"
          else
            echo "head=$(gh pr view "$PR_NUM" -R "$REPO" --json headRefOid -q .headRefOid)" >> "$GITHUB_OUTPUT"
            echo "base=$(gh pr view "$PR_NUM" -R "$REPO" --json baseRefOid -q .baseRefOid)" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout review target (PR head)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.refs.outputs.head }}
          fetch-depth: 0
          path: target

      - name: Checkout trusted tool (main)
        uses: actions/checkout@v4
        with:
          repository: frankekn/needlefish
          ref: main
          path: needlefish

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tool
        working-directory: needlefish
        run: |
          PNPM_VERSION=$(node -p "require('./package.json').packageManager")
          if corepack enable 2>/dev/null && corepack prepare "$PNPM_VERSION" --activate; then
            pnpm install --frozen-lockfile
          else
            npm exec --yes --package "$PNPM_VERSION" -- pnpm install --frozen-lockfile
          fi

      - name: Needlefish review
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_SHA: ${{ steps.refs.outputs.base }}
          PR_HEAD_SHA: ${{ steps.refs.outputs.head }}
          NEEDLEFISH_RUNNER_INPUT: ${{ inputs.runner || github.event.inputs.runner }}
          NEEDLEFISH_MODEL_INPUT: ${{ inputs.model || github.event.inputs.model }}
          NEEDLEFISH_TIMEOUT_MS_INPUT: ${{ inputs.timeout_ms || github.event.inputs.timeout_ms }}
        run: |
          args=(--github --pr "${{ inputs.pr_number || github.event.inputs.pr_number || github.event.pull_request.number }}")
          if [ -n "$NEEDLEFISH_RUNNER_INPUT" ]; then args+=(--runner "$NEEDLEFISH_RUNNER_INPUT"); fi
          if [ -n "$NEEDLEFISH_MODEL_INPUT" ]; then args+=(--model "$NEEDLEFISH_MODEL_INPUT"); fi
          if [ -n "$NEEDLEFISH_TIMEOUT_MS_INPUT" ]; then args+=(--timeout-ms "$NEEDLEFISH_TIMEOUT_MS_INPUT"); fi
          "$GITHUB_WORKSPACE/needlefish/node_modules/.bin/tsx" "$GITHUB_WORKSPACE/needlefish/src/cli.ts" "${args[@]}"
