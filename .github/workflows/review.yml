name: needlefish-review

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review (manual trigger; bypasses pull_request webhook)
        required: true
      runner:
        description: "Model runner: codex, claude, or opencode"
        required: false
      model:
        description: Optional model id for the selected runner
        required: false
      timeout_ms:
        description: Optional per-call timeout in milliseconds
        required: false
      codex_reasoning_effort:
        description: "Codex reasoning effort: medium, high, or xhigh"
        required: false
      needlefish_release_sha:
        description: Optional expected Needlefish release SHA
        required: false
  workflow_call:
    inputs:
      pr_number:
        description: PR number (optional; defaults to the event PR)
        type: string
        required: false
      runner:
        description: "Model runner: codex, claude, or opencode"
        type: string
        required: false
      model:
        description: Optional model id for the selected runner
        type: string
        required: false
      timeout_ms:
        description: Optional per-call timeout in milliseconds
        type: string
        required: false
      codex_reasoning_effort:
        description: "Codex reasoning effort: medium, high, or xhigh"
        type: string
        required: false
      needlefish_release_sha:
        description: Optional expected Needlefish release SHA
        type: string
        required: false

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: needlefish-${{ github.repository }}-${{ inputs.pr_number || github.event.inputs.pr_number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: self-hosted
    if: inputs.pr_number != '' || github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Resolve PR refs
        id: refs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ inputs.pr_number || github.event.inputs.pr_number || github.event.pull_request.number }}
          EVENT_HEAD: ${{ github.event.pull_request.head.sha }}
          EVENT_BASE: ${{ github.event.pull_request.base.sha }}
          EVENT_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          if [ -n "$EVENT_HEAD" ]; then
            head="$EVENT_HEAD"
            base="$EVENT_BASE"
            head_repo="$EVENT_HEAD_REPO"
            state="OPEN"
            if [ "$EVENT_ACTION" = "closed" ]; then state="CLOSED"; fi
          else
            mapfile -t pr_fields < <(gh pr view "$PR_NUM" -R "$REPO" --json baseRefOid,headRefOid,headRepository,state -q '.headRefOid, .baseRefOid, (.headRepository.nameWithOwner // ""), .state')
            head="${pr_fields[0]}"
            base="${pr_fields[1]}"
            head_repo="${pr_fields[2]}"
            state="${pr_fields[3]}"
          fi

          skip=false
          skip_reason=""
          if [ -z "$head" ] || [ -z "$base" ] || [ -z "$state" ]; then
            skip=true
            skip_reason="PR metadata unavailable"
          elif [ "$state" != "OPEN" ]; then
            skip=true
            skip_reason="PR state is $state"
          elif [ "$head_repo" != "$REPO" ]; then
            skip=true
            skip_reason="PR head repository $head_repo differs from $REPO"
          fi

          {
            echo "head=$head"
            echo "base=$base"
            echo "head_repo=$head_repo"
            echo "skip=$skip"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

      - name: Report skipped PR
        if: steps.refs.outputs.skip == 'true'
        run: echo "${{ steps.refs.outputs.skip_reason }}"

      - name: Verify Needlefish release
        if: steps.refs.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ steps.refs.outputs.head }}
          EXPECTED_NEEDLEFISH_SHA: ${{ inputs.needlefish_release_sha || github.event.inputs.needlefish_release_sha }}
        run: |
          if [ -z "$EXPECTED_NEEDLEFISH_SHA" ]; then
            EXPECTED_NEEDLEFISH_SHA="$(gh api repos/frankekn/needlefish/commits/main --jq .sha)"
          fi

          metadata="$HOME/.local/share/needlefish/current/release.json"
          actual_sha=""
          if [ -f "$metadata" ]; then
            actual_sha="$(node -e 'const fs = require("node:fs"); const json = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (typeof json.sha === "string") process.stdout.write(json.sha);' "$metadata" 2>/dev/null || true)"
          fi

          if [ "$actual_sha" != "$EXPECTED_NEEDLEFISH_SHA" ]; then
            if [ -z "$actual_sha" ]; then actual_sha="missing"; fi
            gh api -X POST "repos/$REPO/check-runs" \
              -f name="Needlefish" \
              -f head_sha="$PR_HEAD_SHA" \
              -f status="completed" \
              -f conclusion="failure" \
              -f "output[title]=Needlefish release mismatch" \
              -f "output[summary]=Expected Needlefish release $EXPECTED_NEEDLEFISH_SHA, found $actual_sha in $metadata."
            echo "Needlefish release mismatch: expected $EXPECTED_NEEDLEFISH_SHA, found $actual_sha in $metadata." >&2
            exit 1
          fi

      - name: Checkout review target (PR head)
        if: steps.refs.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.refs.outputs.head }}
          fetch-depth: 0
          path: target

      - name: Needlefish review
        if: steps.refs.outputs.skip != 'true'
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_SHA: ${{ steps.refs.outputs.base }}
          PR_HEAD_SHA: ${{ steps.refs.outputs.head }}
          NEEDLEFISH_RUNNER_INPUT: ${{ inputs.runner || github.event.inputs.runner }}
          NEEDLEFISH_MODEL_INPUT: ${{ inputs.model || github.event.inputs.model }}
          NEEDLEFISH_TIMEOUT_MS_INPUT: ${{ inputs.timeout_ms || github.event.inputs.timeout_ms }}
          CODEX_REASONING_EFFORT: ${{ inputs.codex_reasoning_effort || github.event.inputs.codex_reasoning_effort }}
        run: |
          if [ ! -x "$HOME/.local/bin/needlefish" ]; then
            echo "Missing $HOME/.local/bin/needlefish. Run scripts/deploy-ubuntu.sh on the self-hosted runner." >&2
            exit 1
          fi
          args=(--github --pr "${{ inputs.pr_number || github.event.inputs.pr_number || github.event.pull_request.number }}")
          if [ -n "$NEEDLEFISH_RUNNER_INPUT" ]; then args+=(--runner "$NEEDLEFISH_RUNNER_INPUT"); fi
          if [ -n "$NEEDLEFISH_MODEL_INPUT" ]; then args+=(--model "$NEEDLEFISH_MODEL_INPUT"); fi
          if [ -n "$NEEDLEFISH_TIMEOUT_MS_INPUT" ]; then args+=(--timeout-ms "$NEEDLEFISH_TIMEOUT_MS_INPUT"); fi
          "$HOME/.local/bin/needlefish" "${args[@]}"
